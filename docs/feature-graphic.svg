<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Subtle accent line top -->
  <rect x="0" y="0" width="1024" height="3" fill="#e8ff47" opacity="0.8"/>

  <!-- Icon -->
  <image href="data:image/png;base64," x="80" y="130" width="240" height="240" preserveAspectRatio="xMidYMid meet"/>

  <!-- App name -->
  <text x="380" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="700" fill="#f5f5f5" letter-spacing="-2">PR</text>
  <text x="506" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="700" fill="#e8ff47" letter-spacing="-2">sonal</text>

  <!-- Tagline -->
  <text x="381" y="295" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" fill="#9e9e9e" letter-spacing="1">Your personal gym tracker</text>

  <!-- Subtle accent line bottom -->
  <rect x="0" y="497" width="1024" height="3" fill="#e8ff47" opacity="0.8"/>
</svg>
