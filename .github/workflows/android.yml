name: Build Android APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:

  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  # ── 2. Build web ───────────────────────────────────────────────────────────
  build-web:
    name: Build web
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          retention-days: 1

  # ── 3. Build & sign APK ────────────────────────────────────────────────────
  build-apk:
    name: Build & sign APK
    runs-on: ubuntu-latest
    needs: build-web
    outputs:
      version: ${{ needs.build-web.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist
      - name: Sync Capacitor (generates cordova plugin dirs)
        run: npx cap sync android
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
      - name: Find build-tools version
        id: bt
        run: |
          BT=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          echo "version=$BT" >> $GITHUB_OUTPUT
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign
        env:
          BUILD_TOOLS_VERSION: ${{ steps.bt.outputs.version }}
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - name: Stage signed APK
        run: |
          cp "${{ steps.sign.outputs.signedReleaseFile }}" \
             prsonal-${{ needs.build-web.outputs.version }}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: prsonal-${{ needs.build-web.outputs.version }}.apk
          retention-days: 1

  # ── 4a. Release — nightly (rolling) ───────────────────────────────────────
  release-nightly:
    name: Release nightly
    runs-on: ubuntu-latest
    needs: build-apk
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: signed-apk
      - name: Delete existing nightly
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish nightly
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Latest build (v${{ needs.build-apk.outputs.version }})"
          body: |
            Rolling release — always tracks `main`.

            **v${{ needs.build-apk.outputs.version }}** · commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            > Install once, then future updates install without security prompts.
          prerelease: true
          files: prsonal-${{ needs.build-apk.outputs.version }}.apk

  # ── 4b. Release — versioned (permanent) ───────────────────────────────────
  release-versioned:
    name: Release versioned
    runs-on: ubuntu-latest
    needs: build-apk
    # Check tag existence before spinning up the runner
    outputs:
      skip: ${{ steps.tag-check.outputs.exists }}
    steps:
      - name: Check if versioned tag already exists
        id: tag-check
        run: |
          if gh release view "v${{ needs.build-apk.outputs.version }}" \
               --repo ${{ github.repository }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        if: steps.tag-check.outputs.exists == 'false'
        with:
          name: signed-apk
      - name: Publish versioned release
        if: steps.tag-check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-apk.outputs.version }}
          name: "v${{ needs.build-apk.outputs.version }}"
          body: |
            **PRsonal v${{ needs.build-apk.outputs.version }}**

            Built from commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          prerelease: false
          files: prsonal-${{ needs.build-apk.outputs.version }}.apk
