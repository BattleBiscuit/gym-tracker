name: Release Pipeline (main)

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:

  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  # ── 2. Build web ───────────────────────────────────────────────────────────
  build-web:
    name: Build web
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Compute next version
        id: version
        run: |
          # Stable tags only (no beta)
          LATEST=$(git tag --list 'v*.*.*' | grep -v beta | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          # versionCode = total number of stable tags + 1 (monotonically increasing)
          TAG_COUNT=$(git tag --list 'v*.*.*' | grep -v beta | wc -l | tr -d ' ')
          VERSION_CODE=$((TAG_COUNT + 1))
          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          npm version $NEXT --no-git-tag-version
          echo "Next version: $NEXT (code: $VERSION_CODE)"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          retention-days: 1

  # ── 3. Build & sign APK + AAB ─────────────────────────────────────────────
  build-android:
    name: Build & sign Android
    runs-on: ubuntu-latest
    needs: build-web
    outputs:
      version: ${{ needs.build-web.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Build APK + AAB
        working-directory: android
        run: |
          ./gradlew assembleRelease bundleRelease --no-daemon \
            -PVERSION_CODE=${{ needs.build-web.outputs.version_code }} \
            -PVERSION_NAME=${{ needs.build-web.outputs.version }}
      - name: Find build-tools version
        id: bt
        run: |
          BT=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          echo "version=$BT" >> $GITHUB_OUTPUT
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign-apk
        env:
          BUILD_TOOLS_VERSION: ${{ steps.bt.outputs.version }}
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign-aab
        env:
          BUILD_TOOLS_VERSION: ${{ steps.bt.outputs.version }}
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - name: Stage artifacts
        run: |
          cp "${{ steps.sign-apk.outputs.signedReleaseFile }}" \
             prsonal-${{ needs.build-web.outputs.version }}.apk
          cp "${{ steps.sign-aab.outputs.signedReleaseFile }}" \
             prsonal-${{ needs.build-web.outputs.version }}.aab
      - uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: prsonal-${{ needs.build-web.outputs.version }}.apk
          retention-days: 7
      - uses: actions/upload-artifact@v4
        with:
          name: signed-aab
          path: prsonal-${{ needs.build-web.outputs.version }}.aab
          retention-days: 7

  # ── 4. GitHub Release (APK for sideloading) ───────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: signed-apk
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-android.outputs.version }}
          name: "PRsonal v${{ needs.build-android.outputs.version }}"
          body: |
            v${{ needs.build-android.outputs.version }} · commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            > Install once, then future updates install without security prompts.
          prerelease: false
          make_latest: true
          files: prsonal-${{ needs.build-android.outputs.version }}.apk

