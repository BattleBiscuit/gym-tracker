name: Build Android APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:

  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  # ── 2. Build web ───────────────────────────────────────────────────────────
  build-web:
    name: Build web
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --list 'v*.*.*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=$NEXT" >> $GITHUB_OUTPUT
          # Write version into package.json so __APP_VERSION__ in the build is correct
          npm version $NEXT --no-git-tag-version
          echo "Next version: $NEXT"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          retention-days: 1

  # ── 3. Build & sign APK ────────────────────────────────────────────────────
  build-apk:
    name: Build & sign APK
    runs-on: ubuntu-latest
    needs: build-web
    outputs:
      version: ${{ needs.build-web.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist
      - name: Sync Capacitor (generates cordova plugin dirs)
        run: npx cap sync android
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
      - name: Find build-tools version
        id: bt
        run: |
          BT=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          echo "version=$BT" >> $GITHUB_OUTPUT
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign
        env:
          BUILD_TOOLS_VERSION: ${{ steps.bt.outputs.version }}
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - name: Stage signed APK
        run: |
          cp "${{ steps.sign.outputs.signedReleaseFile }}" \
             prsonal-${{ needs.build-web.outputs.version }}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: prsonal-${{ needs.build-web.outputs.version }}.apk
          retention-days: 1

  # ── 4. Release ────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-apk
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: signed-apk
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-apk.outputs.version }}
          name: "PRsonal v${{ needs.build-apk.outputs.version }}"
          body: |
            v${{ needs.build-apk.outputs.version }} · commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            > Install once, then future updates install without security prompts.
          prerelease: false
          files: prsonal-${{ needs.build-apk.outputs.version }}.apk
