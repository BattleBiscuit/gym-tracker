name: Build Android APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK with short SHA
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             prsonal-debug-${GITHUB_SHA::7}.apk

      - name: Update rolling latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          body: |
            Debug APK built from `${{ github.ref_name }}` — commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            > This is a rolling release. Every push to `main` replaces this APK.
          prerelease: true
          files: prsonal-debug-${{ github.sha }}.apk
