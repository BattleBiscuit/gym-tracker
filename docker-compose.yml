services:
  gymapp:
    build: .
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gymapp.rule=Host(`gym.seidel.life`)"
      - "traefik.http.routers.gymapp.entrypoints=websecure"
      - "traefik.http.services.gymapp.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
